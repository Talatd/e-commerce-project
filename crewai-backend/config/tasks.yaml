catalog_analysis:
  description: >
    Analyze the following product catalog and provide a comprehensive report:
    {product_catalog}
    
    Your analysis must include:
    1. Overall catalog health assessment
    2. Price distribution analysis (budget, mid-range, premium segments)
    3. Category coverage and gaps
    4. Top-performing products (based on ratings and reviews)
    5. Products that may need attention (low ratings, pricing issues)
    6. Competitive positioning insights
    7. Actionable recommendations for catalog improvement
  expected_output: >
    A structured analysis report with clear sections, data-driven insights,
    and specific actionable recommendations for improving the product catalog.
  agent: product_analyst

marketing_content:
  description: >
    Based on the following product catalog, create marketing content:
    {product_catalog}
    
    Generate the following for each product:
    1. An SEO-optimized product title (max 70 characters)
    2. A compelling meta description (max 160 characters)
    3. A persuasive product description (2-3 paragraphs)
    4. 5 key selling points as bullet points
    5. A suggested promotional tagline
    
    Focus on the top 3 products by rating.
  expected_output: >
    Professional marketing content for the top products, ready to be
    published on the e-commerce website, with SEO-friendly formatting.
  agent: marketing_strategist

shopping_advice:
  description: >
    A customer has the following request: {customer_query}
    
    Available product catalog:
    {product_catalog}
    
    Provide personalized shopping advice including:
    1. Understanding of the customer's needs
    2. Top 3 product recommendations with justifications  
    3. Pros and cons comparison of recommended products
    4. Best value pick and premium pick
    5. Any additional tips or considerations
  expected_output: >
    A friendly, detailed shopping guide with clear recommendations,
    honest pros/cons, and helpful advice tailored to the customer's needs.
  agent: customer_advisor
