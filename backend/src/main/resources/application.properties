# Application Settings
spring.application.name=SmartStore Backend
server.port=8080

# Database Configuration (MySQL)
# Default password "root" matches ai-hub and typical local MySQL. Set env DB_PASSWORD to your real password (or empty only if root has no password).
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smartstore_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger / OpenAPI Settings
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT Configuration (secret must be Base64; decode length must suit HS256 — set JWT_SECRET in production)
smartstore.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
smartstore.jwt.expiration=${JWT_EXPIRATION:3600000}

# AI Chatbot Service
smartstore.ai.url=${AI_SERVICE_URL:http://localhost:8000}
