# Application Settings
spring.application.name=SmartStore Backend
server.port=8080

# Database Configuration (MySQL)
# Use environment variables (recommended) so secrets aren't committed.
# Priority order:
# - SPRING_DATASOURCE_* (standard Spring Boot env vars)
# - DB_* (project-friendly aliases)
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:jdbc:mysql://localhost:3306/smartstore_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:root}}
# Default password is empty (set it via env on your machine)
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger / OpenAPI Settings
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT Configuration (secret must be Base64; decode length must suit HS256 — set JWT_SECRET in production)
smartstore.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
smartstore.jwt.expiration=${JWT_EXPIRATION:3600000}

# CORS — comma-separated origins (e.g. http://localhost:4200,https://yourdomain.com). Override via CORS_ALLOWED_ORIGINS in production.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Email (SMTP)
# - Configure to enable real outbound mail (forgot password, order confirmation, shipped notifications).
# - If spring.mail.host is unset, the app will NOT send email; it will log email bodies instead.
#
# Recommended: configure via environment variables (keeps secrets out of git)
# - SPRING_MAIL_HOST=smtp.gmail.com
# - SPRING_MAIL_PORT=587
# - SPRING_MAIL_USERNAME=yourgmail@gmail.com
# - SPRING_MAIL_PASSWORD=your_16_char_app_password  (NO spaces)
#
# Example (Gmail) if you prefer editing this file:
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=yourgmail@gmail.com
# spring.mail.password=your_16_char_app_password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true
# spring.mail.properties.mail.smtp.starttls.required=true
# spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
#
# Sensible defaults (safe to keep committed). These do nothing unless you set SPRING_MAIL_HOST/PORT/USERNAME/PASSWORD.
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.default-encoding=UTF-8
app.mail.from=${MAIL_FROM:noreply@smartstore.local}
# If you prefer configuring directly in this file (instead of MAIL_FROM env var), uncomment and set:
# app.mail.from=yourgmail@gmail.com
app.mail.frontend-base-url=${APP_FRONTEND_BASE_URL:http://localhost:4200}

# AI Chatbot Service
smartstore.ai.url=${AI_SERVICE_URL:http://localhost:8000}
