server.port=8080

# Local dev profile: in-memory DB (no MySQL needed)
spring.datasource.url=jdbc:h2:mem:smartstore_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# AI service URL (default to local ai-hub)
smartstore.ai.url=${AI_SERVICE_URL:http://localhost:8000}

